name: Release

# Build and publish a macOS release when a version tag is pushed.
#
#   git tag v0.2.0
#   git push origin v0.2.0
#
# node-pty is a native module, so each architecture is built on a runner of
# that architecture (no reliable cross-compile): macos-13 = Intel/x64,
# macos-14 = Apple Silicon/arm64. Both .dmg artifacts attach to one Release.
#
# The app is unsigned (personal use): on first launch, right-click the app and
# choose Open to get past Gatekeeper.

on:
  push:
    tags:
      - 'v*'
  # Allow a manual dry run (builds artifacts, does not create a Release).
  workflow_dispatch:

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  verify:
    name: Typecheck and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  build:
    name: Build (${{ matrix.arch }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon only for now. Intel (macos-13 / x64) was dropped —
          # node-pty can't cross-compile, so x64 needs its own scarce Intel
          # runner, and Intel Macs are a shrinking share. Re-add a matrix entry
          # to ship x64 again.
          - os: macos-14
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # electron-builder rebuilds node-pty via node-gyp, which still imports
      # Python's distutils. The runner default (Python 3.12+) removed distutils
      # from the stdlib, so pin 3.11 where it still ships.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        # electron-builder rebuilds node-pty for the bundled Electron's ABI
        # automatically (npmRebuild defaults to true). Build only this runner's
        # arch so the native binary matches.
        run: |
          npm run build
          npx electron-builder --mac --${{ matrix.arch }} --publish never
        env:
          # The renderer bundle pulls in the heavy monaco-vscode packages, which
          # blow past Node's default ~2 GB heap during `electron-vite build`
          # (FATAL: JavaScript heap out of memory). Raise the limit; macos
          # runners have >=7 GB RAM.
          NODE_OPTIONS: --max-old-space-size=6144
          # No code signing (unsigned personal build); skip electron-builder's
          # attempt to discover signing identities.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: dist/*.dmg
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    # Only publish a Release for tag pushes, not manual dry runs.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ### Claude Code Terminal Center ${{ github.ref_name }}

            macOS build (unsigned, Apple Silicon). On first launch, right-click
            the app and choose **Open** to get past Gatekeeper.

            | Mac | Download |
            | --- | --- |
            | Apple Silicon (M-series) | `*-arm64.dmg` |
