appId: dev.grebmann.claude-code-terminal-center
productName: Claude Code Terminal Center
copyright: © 2026 grebmann

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - package.json
  - "!**/*.{md,markdown,d.ts.map,js.map}"

extraResources:
  # NOTE: don't copy icon.icns here — `mac.icon` already places it at
  # Contents/Resources/icon.icns (== process.resourcesPath/icon.icns), so a
  # second copy collides (EEXIST hard-link during packaging). The runtime
  # resolver in index.ts finds the mac.icon copy; win/linux fall back to the
  # png below.
  - from: resources/icon-1024.png
    to: icon-1024.png
  # Bundled Claude Code skills, deployed to ~/.claude/skills/<name> on boot
  # (see src/main/skill-installer.ts). Resolved via process.resourcesPath.
  - from: resources/cc-center-skill.md
    to: cc-center-skill.md
  - from: resources/saved-reports-skill.md
    to: saved-reports-skill.md

asar: true
asarUnpack:
  # node-pty ships a native .node binary that can't run from inside asar
  - "node_modules/node-pty/**/*"

mac:
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  hardenedRuntime: false
  gatekeeperAssess: false
  # Arch is selected per build via the CLI flag (e.g. `electron-builder --mac
  # --arm64`). node-pty is a native module, so each arch must be packaged on a
  # runner of that arch — the release workflow uses a macos-13/macos-14 matrix.
  # Listing arch here would override the flag and force a cross-rebuild.
  target:
    - dmg
  artifactName: "${productName}-${version}-${arch}.${ext}"

dmg:
  sign: false
  artifactName: "${productName}-${version}-${arch}.${ext}"

win:
  icon: resources/icon-1024.png
  target:
    - target: nsis
      arch: [x64]

linux:
  icon: resources/icon-1024.png
  category: Development
  target:
    - target: AppImage
      arch: [x64]
